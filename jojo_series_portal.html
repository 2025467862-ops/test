<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOJO Series Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f0f0f;
color:white;
font-family:Arial,sans-serif;
}

header{
background:black;
border-bottom:2px solid gold;
}

nav{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
padding:20px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.logo{
width:80px;
height:80px;
border:3px solid gold;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-family:'Cinzel', serif;
color:gold;
}

.banner{
height:350px;
background:linear-gradient(to right,#3d004f,#000);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.banner h1{
font-size:50px;
color:gold;
font-family:'Cinzel', serif;
}

.content{
padding:60px 20px;
text-align:center;
}

.content h2{
color:gold;
font-size:40px;
margin-bottom:15px;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
max-width:1000px;
margin:auto;
margin-top:40px;
}

.card{
height:200px;
border:2px solid gold;
background:#1a1a1a;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:bold;
}

footer{
margin-top:60px;
padding:40px;
border-top:2px solid gold;
display:flex;
justify-content:space-between;
align-items:center;
}

.socials{
display:flex;
gap:15px;
}

.circle{
width:40px;
height:40px;
border:2px solid gold;
border-radius:50%;
}

.footer-logo{
width:120px;
height:120px;
border:2px solid gold;
display:flex;
justify-content:center;
align-items:center;
color:gold;
}

@media(max-width:768px){
.gallery{
grid-template-columns:1fr;
}

.banner h1{
font-size:32px;
}
}
</style>
</head>
<body>

<header>
<nav>
<a href="#">About</a>
<a href="#">Support</a>
<div class="logo">JOJO</div>
<a href="#">Contact</a>
<a href="#">Games</a>
</nav>
</header>

<section class="banner">
<h1>JOJO'S BIZARRE ADVENTURE</h1>
<p>The Official Series Portal</p>
</section>

<section class="content">
<h2>JoJo Series</h2>
<p>Explore every part of JoJo's Bizarre Adventure.</p>

<div class="gallery">
<div class="card">Phantom Blood</div>
<div class="card">Battle Tendency</div>
<div class="card">Stardust Crusaders</div>
<div class="card">Diamond Is Unbreakable</div>
<div class="card">Golden Wind</div>
<div class="card">Stone Ocean</div>
<div class="card">Steel Ball Run</div>
<div class="card">JoJolion</div>
<div class="card">JOJOLands</div>
</div>
</section>

<footer>
<div class="socials">
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
</div>

<div class="footer-logo">JOJO</div>
</footer>

</body>
</html>
